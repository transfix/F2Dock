name: CI/CD

on:
  pull_request:
    branches: [ main, master, develop ]
  push:
    branches: [ main, master ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            build_type: Debug
            coverage: true
          - os: ubuntu-latest
            build_type: Release
            coverage: false
          # macOS
          - os: macos-latest
            build_type: Debug
            coverage: false
          - os: macos-latest
            build_type: Release
            coverage: false

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / ${{ matrix.build_type }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Linux dependencies ──
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            libfftw3-dev
          # Coverage tools
          if [ "${{ matrix.coverage }}" = "true" ]; then
            sudo apt-get install -y --no-install-recommends lcov
          fi

      # ── macOS dependencies ──
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install \
            cmake \
            ninja \
            fftw

      # ── Configure ──
      - name: Configure (Unix)
        run: |
          cmake_args=(
            -B build
            -G Ninja
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          )
          if [ "${{ matrix.coverage }}" = "true" ]; then
            # F2Dock's CMakeLists.txt overwrites CMAKE_CXX_FLAGS via set(),
            # so we inject coverage flags through CPPFLAGS/LDFLAGS env vars
            # which the CMakeLists.txt already picks up via $ENV{CPPFLAGS}.
            export CPPFLAGS="--coverage -fprofile-arcs -ftest-coverage"
            export LDFLAGS="--coverage"
          fi
          cmake "${cmake_args[@]}"

      # ── Build ──
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      # ── Test ──
      # F2Dock does not currently have a CTest-based test suite.
      # When tests are added, enable the step below.
      # - name: Run tests
      #   run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure --parallel

      # ── Coverage (Linux Debug only) ──
      - name: Generate coverage report
        if: matrix.coverage
        run: |
          lcov --directory build --capture --output-file build/coverage.info --ignore-errors mismatch
          lcov --remove build/coverage.info \
            '/usr/*' \
            '*/test/*' \
            '*/tests/*' \
            '*/_deps/*' \
            --output-file build/coverage_filtered.info
          genhtml build/coverage_filtered.info \
            --output-directory build/coverage_html \
            --title "F2Dock Code Coverage" \
            --legend \
            --demangle-cpp \
            --ignore-errors source

      - name: Upload coverage report
        if: matrix.coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage_html/
          retention-days: 30

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v4
        with:
          files: build/coverage_filtered.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # ── Verify executables ──
      - name: Verify executables exist
        run: |
          test -x build/bin/F2Dock
          test -x build/bin/GB-Rerank
          test -x build/bin/F2DockServer
          test -x build/bin/FilterOutput
          echo "All 4 executables built successfully"

      # ── Upload build artifacts ──
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.build_type }}
          path: |
            build/bin/
            build/lib/
          retention-days: 14
